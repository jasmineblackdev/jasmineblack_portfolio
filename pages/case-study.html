<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Case Study Details">
  <title id="page-title">Case Study | Jasmine Black</title>
  
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/pages.css">
  <link rel="icon" type="image/png" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💼</text></svg>">
  
  <style>
    .portfolio-badge {
      display: inline-block;
      padding: 0.5rem 1rem;
      background-color: hsl(12, 76%, 96%);
      color: var(--accent);
      border-radius: var(--radius);
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 1.5rem;
    }
    
    .case-meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
      padding: 1.5rem;
      background-color: var(--secondary);
      border-radius: var(--radius);
    }
    
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .meta-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted-foreground);
      font-weight: 600;
    }
    
    .meta-value {
      font-size: 0.875rem;
      color: var(--foreground);
    }
    
    .highlight-box {
      padding: 1.5rem;
      background-color: var(--card);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius);
      margin: 2rem 0;
    }
    
    .highlight-box strong {
      color: var(--accent);
      display: block;
      margin-bottom: 0.5rem;
    }
    
    .decision-card {
      padding: 1.5rem;
      background-color: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
    }
    
    .decision-card h3 {
      font-size: 1.125rem;
      margin-bottom: 1rem;
      color: var(--foreground);
    }
    
    .decision-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    @media (min-width: 768px) {
      .decision-row {
        grid-template-columns: 1fr 1fr;
      }
    }
    
    .decision-initial {
      padding: 1rem;
      background-color: hsl(0, 70%, 97%);
      border-radius: var(--radius);
    }
    
    .decision-final {
      padding: 1rem;
      background-color: hsl(120, 60%, 97%);
      border-radius: var(--radius);
    }
    
    .decision-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    
    .decision-initial .decision-label {
      color: hsl(0, 70%, 40%);
    }
    
    .decision-final .decision-label {
      color: hsl(120, 60%, 30%);
    }
    
    .decision-reasoning {
      font-size: 0.875rem;
      color: var(--muted-foreground);
      font-style: italic;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

  <!-- Case Study Header -->
  <section class="case-study-hero">
    <div class="container">
      <a href="case-studies.html" class="back-link">
        <svg class="icon" width="14" height="14"><use href="#icon-arrow-left"></use></svg>
        All Case Studies
      </a>
      
      <div class="case-study-header" id="case-header">
        <!-- Content loaded by JavaScript -->
      </div>
    </div>
  </section>

  <!-- Case Study Image -->
  <div class="case-study-image-container" id="case-image">
    <!-- Image loaded by JavaScript -->
  </div>

  <!-- Case Study Content -->
  <div class="case-study-content" id="case-content">
    <!-- Content loaded by JavaScript -->
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-text">
        © 2025 Jasmine Black. Designed & built with intention.
      </div>
      
      <div class="footer-links">
        <a href="mailto:jasmineblack@yourdomain.com" class="footer-icon" aria-label="Email">
          <svg class="icon" width="18" height="18"><use href="#icon-mail"></use></svg>

        <a href="https://github.com/jasmineblackdev" target="_blank" rel="noopener noreferrer" class="footer-icon" aria-label="GitHub">
          <svg class="icon" width="18" height="18"><use href="#icon-github"></use></svg>

      </div>
    </div>

  <script src="../js/case-studies-data.js"></script>
  <script>
    // Get slug from URL
    const urlParams = new URLSearchParams(window.location.search);
    const slug = urlParams.get('slug');
    
    if (!slug) {
      window.location.href = 'case-studies.html';
    } else {
      const study = getCaseStudyBySlug(slug);
      
      if (!study) {
        window.location.href = 'case-studies.html';
      } else {
        // Update page title
        document.getElementById('page-title').textContent = `${study.title} | Jasmine Black`;
        
        // Render header
        const header = document.getElementById('case-header');
        let headerHTML = '';
        
        if (study.isPortfolioProject) {
          headerHTML += `
            <div class="portfolio-badge">
              <svg style="width: 16px; height: 16px; display: inline-block; vertical-align: middle; margin-right: 4px;" fill="none" stroke="currentColor" stroke-width="2"><use href="#icon-lightbulb"></use></svg>
              Portfolio Project | Built to demonstrate UX process & product thinking
            </div>
          `;
        }
        
        headerHTML += `
          <h1>${study.title}</h1>
          <p class="case-study-tagline">${study.tagline}</p>
          <div class="case-meta-grid">
            <div class="meta-item">
              <span class="meta-label">Role</span>
              <span class="meta-value">${study.role}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Platform</span>
              <span class="meta-value">${study.platform}</span>
            </div>
        `;
        
        if (study.timeline) {
          headerHTML += `
            <div class="meta-item">
              <span class="meta-label">Timeline</span>
              <span class="meta-value">${study.timeline}</span>
            </div>
          `;
        }
        
        if (study.tools) {
          headerHTML += `
            <div class="meta-item">
              <span class="meta-label">Tools</span>
              <span class="meta-value">${study.tools}</span>
            </div>
          `;
        }
        
        headerHTML += `</div>`;
        header.innerHTML = headerHTML;
        
        // Render image
        const imageContainer = document.getElementById('case-image');
        imageContainer.innerHTML = `<img src="../${study.image}" alt="${study.title}" loading="lazy">`;
        
        // Render content
        const content = document.getElementById('case-content');
        let contentHTML = '';
        
        // Context (if available)
        if (study.context) {
          contentHTML += `
            <div class="highlight-box">
              <strong>Context & Market Opportunity</strong>
              <p>${study.context}</p>
            </div>
          `;
        }
        
        // Problem
        contentHTML += `
          <div class="content-section">
            <h2>The Problem</h2>
            <p>${study.problem}</p>
          `;
        
        if (study.targetUser) {
          contentHTML += `<p><strong>Target User:</strong> ${study.targetUser}</p>`;
        }
        
        contentHTML += `</div>`;
        
        // User Research (if available)
        if (study.userResearch || study.competitiveAnalysis || study.keyInsight) {
          contentHTML += `<div class="content-section"><h2>Research & Discovery</h2>`;
          
          if (study.competitiveAnalysis) {
            contentHTML += `<p><strong>Competitive Analysis:</strong> ${study.competitiveAnalysis}</p>`;
          }
          
          if (study.userResearch) {
            contentHTML += `<p><strong>User Research Findings:</strong></p><ul class="content-list">`;
            study.userResearch.forEach(item => {
              contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
            });
            contentHTML += `</ul>`;
          }
          
          if (study.keyInsight) {
            contentHTML += `
              <div class="highlight-box" style="margin-top: 1.5rem;">
                <strong>Key Insight</strong>
                <p>${study.keyInsight}</p>
              </div>
            `;
          }
          
          contentHTML += `</div>`;
        }
        
        // Goal
        contentHTML += `
          <div class="content-section">
            <h2>Project Goal</h2>
            <p>${study.goal}</p>
        `;
        
        if (study.designGoals) {
          contentHTML += `<p><strong>Design Goals:</strong></p><ul class="content-list">`;
          study.designGoals.forEach(item => {
            contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
          });
          contentHTML += `</ul>`;
        }
        
        if (study.constraints) {
          contentHTML += `<p><strong>Constraints:</strong></p><ul class="content-list">`;
          study.constraints.forEach(item => {
            contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
          });
          contentHTML += `</ul>`;
        }
        
        contentHTML += `</div>`;
        
        // Solution
        contentHTML += `
          <div class="content-section">
            <h2>The Solution</h2>
            <p>${study.solution}</p>
          </div>
        `;
        
        // UX Process
        contentHTML += `
          <div class="content-section">
            <h2>UX Process</h2>
            <ul class="content-list">
        `;
        
        study.process.forEach(item => {
          contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
        });
        
        contentHTML += `</ul></div>`;
        
        // Key Design Decisions
        contentHTML += `<div class="content-section"><h2>Key Design Decisions</h2>`;
        
        if (Array.isArray(study.decisions) && study.decisions.length > 0 && typeof study.decisions[0] === 'object') {
          // New format with detailed decisions
          study.decisions.forEach(decision => {
            contentHTML += `
              <div class="decision-card">
                <h3>${decision.title}</h3>
                <div class="decision-row">
                  <div class="decision-initial">
                    <div class="decision-label">❌ Initial Approach</div>
                    <p>${decision.initial}</p>
                  </div>
                  <div class="decision-final">
                    <div class="decision-label">✅ Final Solution</div>
                    <p>${decision.final}</p>
                  </div>
                </div>
                <div class="decision-reasoning">
                  <strong>Why:</strong> ${decision.reasoning}
                </div>
              </div>
            `;
          });
        } else {
          // Old format - simple list
          contentHTML += `<ul class="content-list">`;
          study.decisions.forEach(item => {
            contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
          });
          contentHTML += `</ul>`;
        }
        
        contentHTML += `</div>`;
        
        // Design System (if available)
        if (study.designSystem) {
          contentHTML += `
            <div class="content-section">
              <h2>Design System</h2>
              <ul class="content-list">
          `;
          study.designSystem.forEach(item => {
            contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
          });
          contentHTML += `</ul></div>`;
        }
        
        // What I'd Do Differently (if available)
        if (study.whatIdDoDifferently) {
          contentHTML += `
            <div class="content-section">
              <h2>What I'd Do Differently</h2>
              <ul class="content-list">
          `;
          study.whatIdDoDifferently.forEach(item => {
            contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
          });
          contentHTML += `</ul></div>`;
        }
        
        // Outcome
        contentHTML += `
          <div class="content-section">
            <h2>Outcomes & Impact</h2>
            <p>${study.outcome}</p>
        `;
        
        if (study.portfolioValue) {
          contentHTML += `
            <div class="highlight-box" style="margin-top: 1.5rem;">
              <strong>Portfolio Value</strong>
              <p>${study.portfolioValue}</p>
            </div>
          `;
        }
        
        if (study.learnings) {
          contentHTML += `<p><strong>Key Learning:</strong> ${study.learnings}</p>`;
        }
        
        if (study.deliverables) {
          contentHTML += `<p><strong>Deliverables:</strong></p><ul class="content-list">`;
          study.deliverables.forEach(item => {
            contentHTML += `<li><span class="list-bullet"></span>${item}</li>`;
          });
          contentHTML += `</ul>`;
        }
        
        contentHTML += `</div>`;
        
        // Next case study
        const nextStudy = getNextCaseStudy(slug);
        contentHTML += `
          <div class="next-case-study">
            <a href="case-study.html?slug=${nextStudy.slug}" class="next-case-study-link">
              <div>
                <p class="next-case-label">Next Case Study</p>
                <p class="next-case-title">${nextStudy.title}</p>
              </div>
              <svg class="next-arrow" width="20" height="20"><use href="#icon-arrow-right"></use></svg>
            </a>
          </div>
        `;
        
        content.innerHTML = contentHTML;
      }
    }
  </script>
  <script src="../js/main.js"></script>
</body>
